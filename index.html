<div class="form2col">
  <!-- คอลัมน์ซ้าย -->
  <div class="col">
    <div class="field"><label>วันที่ (Dep)</label><input type="date" id="depDate" required></div>
    <div class="field"><label>เวลาออก (ท้องถิ่น)</label><input type="time" id="depTime" required step="60"></div>
    <div class="field"><label>UTC Offset ต้นทาง</label><select id="depOffset"></select></div>

    <div class="field"><label>สายการบิน</label><input id="airline" class="uc" autocapitalize="characters" placeholder="THA / TG" inputmode="latin-name"></div>
    <div class="field"><label>เที่ยวบิน</label><input id="flightNo" class="uc" autocapitalize="characters" placeholder="TG102" required inputmode="latin-prose"></div>
    <div class="field"><label>เครื่องบิน</label><input id="aircraftType" class="uc" autocapitalize="characters" placeholder="A320 / B738" inputmode="latin-name"></div>
    <div class="field"><label>ทะเบียน</label><input id="registration" class="uc" autocapitalize="characters" placeholder="HS-XXX" inputmode="latin-name"></div>
  </div>

  <!-- คอลัมน์ขวา -->
  <div class="col">
    <div class="field"><label>วันที่ (Arr)</label><input type="date" id="arrDate" required></div>
    <div class="field"><label>เวลาถึง (ท้องถิ่น)</label><input type="time" id="arrTime" required step="60"></div>
    <div class="field"><label>UTC Offset ปลายทาง</label><select id="arrOffset"></select></div>

    <div class="field"><label>ต้นทาง</label><input id="origin" class="uc" autocapitalize="characters" placeholder="BKK – Suvarnabhumi" inputmode="latin-name"></div>
    <div class="field"><label>ปลายทาง</label><input id="destination" class="uc" autocapitalize="characters" placeholder="HKT – Phuket" inputmode="latin-name"></div>

    <div class="field"><label>Landings (Day/Night)</label>
      <div class="row" style="align-items:center">
        <input type="number" id="ldgDay" min="0" value="1" inputmode="numeric" style="max-width:120px">
        <input type="number" id="ldgNight" min="0" value="0" inputmode="numeric" style="max-width:120px">
      </div>
    </div>

    <div class="field" style="flex:2"><label>หมายเหตุ</label>
      <textarea id="remarks" rows="2" placeholder="Routing, MEL, ATC, Fuel, Wx"></textarea>
    </div>

    <div class="field"><label>เวลาบิน (อัตโนมัติ)</label><input id="airTime" placeholder="0:00" readonly></div>
  </div>
</div>

<!-- ปุ่ม -->
<div class="row" style="justify-content:flex-end;margin-top:10px">
  <button type="button" class="btn ghost" id="resetBtn">ล้างฟอร์ม</button>
  <button type="submit" class="btn primary">บันทึก</button>
</div>
